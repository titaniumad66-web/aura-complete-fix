<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <meta property="og:title" content="Aura - Birthday Website Creator" />
    <meta property="og:description" content="Create personalized, emotional birthday websites automatically." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://replit.com/public/images/opengraph.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@replit" />
    <meta name="twitter:title" content="Aura - Birthday Website Creator" />
    <meta name="twitter:description" content="Create personalized, emotional birthday websites automatically." />
    <meta name="twitter:image" content="https://replit.com/public/images/opengraph.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="initial-loader" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #FFF7FA; z-index: 9999;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
          <div style="width: 48px; height: 48px; border: 3px solid #FFD6E7; border-top-color: #FF6B9D; border-radius: 50%; animate: spin 1s linear infinite;"></div>
          <style>
            @keyframes spin { to { transform: rotate(360deg); } }
            #initial-loader { transition: opacity 0.5s ease-out; }
          </style>
          <span style="font-family: 'DM Sans', sans-serif; font-size: 14px; color: #FF6B9D; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;">Aura</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loader once React has started rendering
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>
  </body>
</html>
